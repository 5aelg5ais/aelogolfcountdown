<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AELO Golf 2026 Countdown</title>
    
    <!-- 🚀 FORCE NO-CACHE META TAGS -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        /* Reset and Mobile Optimization */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05080c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 9:16 Aspect Ratio Poster Framework */
        .poster-container {
            width: 100vw;
            height: 100vh;
            max-width: 56.25vh; /* Perfect 9:16 constraints */
            max-height: 177.78vw; 
            position: relative;
            
            /* Reference Background Image Setup */
            background-image: url('Countdown Template v3.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        /* --- ✨ ANIMATION LAYER: FLYING GOLF BALLS --- */
        .golf-ball-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%; /* Keeps it in the sky area */
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .golf-ball {
            position: absolute;
            width: 14px;
            height: 14px;
            /* Radial gradient creates a 3D sphere look */
            background: radial-gradient(circle at 35% 35%, #ffffff, #e0e0e0, #999999);
            border-radius: 50%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            opacity: 0;
        }

        /* Staggered balls crossing the sky at different times and angles */
        .golf-ball:nth-child(1) { 
            bottom: 0%; left: -5%; 
            animation: driveRight 4s cubic-bezier(0.25, 1, 0.5, 1) infinite; 
            animation-delay: 0.5s; 
        }
        .golf-ball:nth-child(2) { 
            bottom: 20%; right: -5%; 
            animation: driveLeft 4.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; 
            animation-delay: 2.5s; 
        }
        .golf-ball:nth-child(3) { 
            bottom: 10%; left: -10%; 
            animation: driveRight 3.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; 
            animation-delay: 1.2s; 
        }

        /* Animation moving right and scaling down to simulate distance */
        @keyframes driveRight {
            0% { transform: translate(0, 0) scale(2); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(120vw, -40vh) scale(0.2); opacity: 0; }
        }

        /* Animation moving left and scaling down */
        @keyframes driveLeft {
            0% { transform: translate(0, 0) scale(1.5); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-120vw, -30vh) scale(0.2); opacity: 0; }
        }

        /* --- ⏳ INTERACTIVE OVERLAY FRAME AREA --- */
        .counter-overlay-box {
            position: absolute;
            top: 10.5%; 
            left: 7.5%;
            width: 85%;
            height: 23%;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none; 
            z-index: 2;
        }

        /* Giant Dynamic Countdown Number with fixed 1-second accelerated pulse string link */
        .dynamic-number {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.9;
            margin: 0;
            color: #ffffff;
            animation: neonPulseFast 1s ease-in-out infinite alternate;
        }

        /* Description State Label text styling */
        .dynamic-label {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: #ffffff; 
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9), 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Accelerated pulsing kinetic speed loop */
        @keyframes neonPulseFast {
            0% {
                text-shadow: 0 0 4px #fff, 0 0 10px rgba(255, 215, 0, 0.6), 0 0 15px rgba(255, 215, 0, 0.4);
            }
            100% {
                text-shadow: 0 0 12px #fff, 0 0 25px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 215, 0, 0.8);
            }
        }

       /* --- 📝 SIDE COLUMNS FRAMEWORK --- */
        .side-panel {
            position: absolute;
            bottom: 10%; /* Centers vertically */
            transform: translateY(-50%);
            width: 25%; /* Fits perfectly inside your white transparent columns */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .left-panel {
            left: 0;
        }

        .right-panel {
            right: 0;
        }

        /* Bold, condensed text matching your reference */
        .column-text-left {
            font-family: "Impact", "Arial Black", "Segoe UI Black", sans-serif;
            font-size: clamp(1rem, 3vw, 2rem);
            line-height: 1.05;
            color: #000000;
            letter-spacing: 0.5px;
            font-weight: 900;
        }
        /* Different font sizing for left and right column text */
        .column-text-right {
            font-family: "Impact", "Arial Black", "Segoe UI Black", sans-serif;
            font-size: clamp(1rem, 3vw, 2rem);
            line-height: 1.05;
            color: #000000;
            letter-spacing: 0.5px;
            font-weight: 900;
        }

        /* --- ⬅️ LEFT COLUMN STYLES --- */
 

        .register-link-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none; 
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .register-link-group:hover {
            transform: scale(1.05); /* Slight pop effect on hover */
        }

        .register-icon {
            width: clamp(45px, 7vw, 65px);
            height: clamp(45px, 7vw, 65px);
            margin-top: 12px;
            fill: none;
            stroke: #000000;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- ➡️ RIGHT COLUMN STYLES --- */
        .insta-link-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none; /* Removes the default blue underline from links */
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .insta-link-group:hover {
            transform: scale(1.05); /* Slight pop effect on hover */
        }

        .insta-icon {
            width: clamp(40px, 6vw, 60px);
            height: clamp(40px, 6vw, 60px);
            margin-bottom: 12px;
            fill: none;
            stroke: #000000;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- 🤫 SECRET GOLF BALL BUTTON --- */
        .secret-golf-ball-btn {
            position: absolute;
            
            /* Adjust these to perfectly center the circle over your golf ball */
            bottom: 17%; 
            left: 50%;
            transform: translateX(-50%);
            
            /* Size of the clickable area */
            width: 28%; 
            aspect-ratio: 1 / 1; 
            border-radius: 50%; /* Makes the invisible button a perfect circle */
            
            z-index: 10;
            cursor: pointer;
            display: block;
            
            /* 🚨 TEMPORARY: Leave this on to align the button, then delete it to make it invisible! */
            /*border: 2px dashed red; 
            background-color: rgba(255, 0, 0, 0.2); */
        }

        /* --- 📅 EVENT DETAILS STYLING --- */
        .event-details {
            position: absolute;
            /* Adjust this bottom percentage to nudge the text up or down above the ball */
            bottom: 45%; 
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            text-align: center;
            z-index: 5;
            color: #ffffff; /* Crisp white text */
            
            /* A heavy, dark shadow ensures the text pops against the bright grass */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 30, 0, 0.6);
        }

        .event-title {
            font-family: "Impact", "Arial Black", "Segoe UI Black", sans-serif;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .event-info {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: clamp(1.0rem, 3.5vw, 1.2rem);
            font-weight: 700;
            margin: 4px 0;
            letter-spacing: 0.5px;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        
        <!-- Flying Golf Balls Animation -->
        <div class="golf-ball-effects">
            <div class="golf-ball"></div>
            <div class="golf-ball"></div>
            <div class="golf-ball"></div>
        </div>
        
        <!-- HUD Central Readout Counter -->
        <div class="counter-overlay-box">
            <h1 class="dynamic-number" id="days-count">--</h1>
            <p class="dynamic-label" id="days-label">Days To Go</p>
        </div>

        <!-- 📅 EVENT DETAILS OVERLAY -->
        <div class="event-details">
            <h2 class="event-title">AELO Golf & Dinner</h2>
            <p class="event-info">2 Oct 2026</p>
            <p class="event-info">Sembawang Country Club</p>
            <p class="event-info">1230H to 2100H</p>
        </div>

        <!-- ⬅️ LEFT COLUMN: Registration -->
        <div class="side-panel left-panel">
            <a href="https://form.gov.sg/6a424307fb2b9992c94bbd02" target="_blank" rel="noopener noreferrer" class="register-link-group">

                <div class="column-text-left">REGISTER<br>HERE!</div>
            
                <!-- SVG Clipboard/Form Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="register-icon">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>

            </a>
        </div>

        <!-- ➡️ RIGHT COLUMN: Instagram -->
        <div class="side-panel right-panel">
            <!-- Clickable Instagram Group -->
            <a href="https://www.instagram.com/aelo_golf?igsh=MXRjaXR4MDBrcWNkZw==" target="_blank" rel="noopener noreferrer" class="insta-link-group">
                <!-- SVG Instagram Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="insta-icon">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
                
                <div class="column-text-right">UPDATES<br>HERE!</div>
            </a>
        </div>

        <!-- 🤫 INVISIBLE GOLF BALL WHATSAPP BUTTON -->
        <a href="#" 
           onclick="triggerGolfBlooper(event)"
           class="secret-golf-ball-btn"
           title="Join our AELO Golf WhatsApp Group!">
        </a>

        

    </div>

    <script>
    function runSystemCountdownEngine() {
        // 1. Get current time explicitly forced into Singapore Time (Asia/Singapore)
        const nowSG = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Singapore" }));
        
        // 2. Set Target Event Date explicitly in Singapore Time (October 2, 2026)
        const targetSG = new Date(2026, 9, 2); // Oct is index 9

        // 3. Clear time layers completely to compare pure midnight-to-midnight calendar dates
        const currentLocalDateOnly = new Date(nowSG.getFullYear(), nowSG.getMonth(), nowSG.getDate());
        const targetLocalDateOnly = new Date(targetSG.getFullYear(), targetSG.getMonth(), targetSG.getDate());

        // 4. Calculate absolute day gap delta
        const timeDelta = targetLocalDateOnly - currentLocalDateOnly;
        const totalDaysRemaining = Math.round(timeDelta / (1000 * 60 * 60 * 24));
        
        const numberDOM = document.getElementById('days-count');
        const labelDOM = document.getElementById('days-label');

        if (totalDaysRemaining > 1) {
            numberDOM.innerText = totalDaysRemaining;
            labelDOM.innerText = "Days To Go";
        } else if (totalDaysRemaining === 1) {
            numberDOM.innerText = "01";
            labelDOM.innerText = "Day To Go";
        } else if (totalDaysRemaining === 0) {
            numberDOM.innerText = "🎉";
            labelDOM.innerText = "It's AELO Golf Day!";
        } else {
            numberDOM.innerText = "00";
            labelDOM.innerText = "See You At Next Year's Par-Tee!";
        }
    }

    window.onload = runSystemCountdownEngine;

    function triggerGolfBlooper(event) {
        // Prevents the page from jumping to the top when clicked
        event.preventDefault(); 
        
        // 💬 Choose your favorite pun here!
        alert("Nice drive! 🏌️‍♂️ You've landed straight on the WhatsApp green. See you in the clubhouse!");
        
        // 🔗 Replace this with your actual WhatsApp invite link
        window.open("https://chat.whatsapp.com/CmTnh54YVTUHW8FwMI2hJ6", "_blank");
    }
    </script>
</body>
</html>
