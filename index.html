<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AELO Golf 2026 Countdown</title>
    
    <!-- 🚀 FORCE NO-CACHE META TAGS -->
    <meta http-serif="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-serif="Pragma" content="no-cache">
    <meta http-serif="Expires" content="0">
    
    <style>
        /* Reset and Mobile Optimization */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05080c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 9:16 Aspect Ratio Poster Framework */
        .poster-container {
            width: 100vw;
            height: 100vh;
            max-width: 56.25vh; /* Perfect 9:16 constraints */
            max-height: 177.78vw; 
            position: relative;
            
            /* Reference Background Image Setup */
            background-image: url('Countdown Template.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        /* --- ✨ ANIMATION LAYER: FULL-WIDTH TOP HALF SHOOTING STARS --- */
        .space-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%; /* Spans the top half completely above the personnel */
            pointer-events: none;
            z-index: 1;
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, #00f2fe, rgba(0, 0, 0, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #00f2fe);
            animation: tail 4000ms ease-in-out infinite, shooting 4000ms ease-in-out infinite;
        }

        /* Staggered placements crossing full left-to-right grid lanes */
        .shooting-star:nth-child(1) { top: 5%; left: 80%; animation-delay: 0s; animation-duration: 3.5s; }
        .shooting-star:nth-child(2) { top: 18%; left: 95%; animation-delay: 1.5s; animation-duration: 4.5s; }
        .shooting-star:nth-child(3) { top: 12%; left: 40%; animation-delay: 0.7s; animation-duration: 3s; }
        .shooting-star:nth-child(4) { top: 25%; left: 70%; animation-delay: 2.3s; animation-duration: 4s; }

        @keyframes tail {
            0% { width: 0; }
            25% { width: 120px; }
            100% { width: 0; }
        }

        @keyframes shooting {
            0% { transform: translateX(0) translateY(0) rotate(-35deg); }
            100% { transform: translateX(-400px) translateY(280px) rotate(-35deg); }
        }

        /* --- ⏳ INTERACTIVE OVERLAY FRAME AREA --- */
        .counter-overlay-box {
            position: absolute;
            top: 10.5%; 
            left: 7.5%;
            width: 85%;
            height: 23%;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none; 
            z-index: 2;
        }

        /* Giant Dynamic Countdown Number with fixed 1-second accelerated pulse string link */
        .dynamic-number {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.9;
            margin: 0;
            color: #ffffff;
            animation: neonPulseFast 1s ease-in-out infinite alternate;
        }

        /* Description State Label text styling */
        .dynamic-label {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: #00f2fe;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }

        /* Accelerated pulsing kinetic speed loop */
        @keyframes neonPulseFast {
            0% {
                text-shadow: 0 0 4px #fff, 0 0 10px rgba(0, 242, 254, 0.6), 0 0 15px rgba(0, 242, 254, 0.4);
            }
            100% {
                text-shadow: 0 0 12px #fff, 0 0 25px rgba(0, 242, 254, 1), 0 0 40px rgba(0, 242, 254, 0.8);
            }
        }
    </style>
</head>
<body>

    <div class="poster-container">
        
        <!-- Sky Matrix Overlay Animation -->
        <div class="space-effects">
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
        </div>
        
        <!-- HUD Central Readout Counter -->
        <div class="counter-overlay-box">
            <h1 class="dynamic-number" id="days-count">--</h1>
            <p class="dynamic-label" id="days-label">Days To Go</p>
        </div>

    </div>

    <script>
    function runSystemCountdownEngine() {
        // 1. Get current time explicitly forced into Singapore Time (Asia/Singapore)
        const nowSG = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Singapore" }));
        
        // 2. Set Target Event Date explicitly in Singapore Time (October 2, 2026)
        const targetSG = new Date(2026, 9, 2); // Oct is index 9

        // 3. Clear time layers completely to compare pure midnight-to-midnight calendar dates
        const currentLocalDateOnly = new Date(nowSG.getFullYear(), nowSG.getMonth(), nowSG.getDate());
        const targetLocalDateOnly = new Date(targetSG.getFullYear(), targetSG.getMonth(), targetSG.getDate());

        // 4. Calculate absolute day gap delta
        const timeDelta = targetLocalDateOnly - currentLocalDateOnly;
        const totalDaysRemaining = Math.round(timeDelta / (1000 * 60 * 60 * 24));
        
        const numberDOM = document.getElementById('days-count');
        const labelDOM = document.getElementById('days-label');

        if (totalDaysRemaining > 1) {
            numberDOM.innerText = totalDaysRemaining;
            labelDOM.innerText = "Days To Go";
        } else if (totalDaysRemaining === 1) {
            numberDOM.innerText = "01";
            labelDOM.innerText = "Day To Go";
        } else if (totalDaysRemaining === 0) {
            numberDOM.innerText = "🎉";
            labelDOM.innerText = "It's Dinner Day!";
        } else {
            numberDOM.innerText = "00";
            labelDOM.innerText = "Event Concluded";
        }
    }

    window.onload = runSystemCountdownEngine;
</script>
</body>
</html>
